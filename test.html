<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>landing page inutile</title>
  <style>
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: purple;
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center; /* centra pulsante e testo */
    }

    .btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: transform 0.3s ease;
    }

    .btn img {
      width: 400px;   /* puoi cambiare dimensione */
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .btn:hover {
      transform: scale(1.1);
    }

    .caption {
      margin-top: 15px;
      font-size: 0.8rem;
      color: black;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Pulsante con immagine -->
    <button class="btn">
      <img src="LOGO_LPB.png" alt="Pulsante PNG">
    </button>
    <!-- Testo sotto -->
    <p class="caption">il pulsante ancora non funziona</p>
  </div>
</body>
</html>
